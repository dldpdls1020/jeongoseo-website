backend:
  name: github
  repo: dldpdls1020/jeongoseo-website
  branch: main
  base_url: https://jeongoseo-website.vercel.app
  auth_endpoint: api/auth

publish_mode: editorial_workflow

media_folder: "content/notices/images"
public_folder: "/content/notices/images"

collections:
  - name: "notices"
    label: "공지사항"
    label_singular: "공지글"
    folder: "content/notices"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: title
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성일", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm", picker_utc: false }
      - { label: "댓글 허용", name: "comments", widget: "boolean", default: true, hint: "끄면 이 글에는 댓글창이 보이지 않습니다" }
      - { label: "내용", name: "body", widget: "markdown" }

  - name: "voices"
    label: "고객의 소리"
    label_singular: "고객의 소리 글"
    folder: "content/voices"
    create: false
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: name
    summary: "{{name}} — {{date}} {{fields.public}}"
    fields:
      - { label: "이름", name: "name", widget: "string" }
      - { label: "이메일 (관리자 확인용, 공개 안 됨)", name: "email", widget: "string" }
      - { label: "내용", name: "message", widget: "text" }
      - { label: "작성일", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm", picker_utc: false }
      - { label: "사이트에 공개", name: "public", widget: "boolean", default: true, hint: "끄면 이 글은 방명록 목록에서 숨겨집니다 (삭제되지는 않아요)" }

  - name: "testimonials"
    label: "이용 후기"
    label_singular: "후기"
    folder: "content/testimonials"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: name
    summary: "{{name}} — {{fields.role}}"
    fields:
      - { label: "이름 (또는 닉네임)", name: "name", widget: "string" }
      - { label: "소개 (예: 에세이 수강생)", name: "role", widget: "string", required: false }
      - { label: "후기 내용", name: "quote", widget: "text" }
      - { label: "사이트에 공개", name: "public", widget: "boolean", default: true }
